name: Build iOS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bump Version
        run: node scripts/bump-version.js
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Install Apple Certificate
        env:
          CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # create variables
          CERT_PATH=$RUNNER_TEMP/build_cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate and provisioning profile from secrets
          echo "$CERTIFICATE" | base64 --decode > $CERT_PATH

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERT_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISIONING_PROFILE" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --no-install

      - name: Build IPA
        run: |
          cd ios
          xcodebuild -workspace Longeviclinics.xcworkspace \
            -scheme Longeviclinics \
            -configuration Release \
            -archivePath build/Longeviclinics.xcarchive \
            archive \
            -allowProvisioningUpdates
          
          xcodebuild -exportArchive \
            -archivePath build/Longeviclinics.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa

      - name: Upload to TestFlight
        env:
          APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          # This step usually requires xcrun altool or Transporter
          # For brevity, documenting the command
          echo "Uploading to TestFlight..."
          API_KEY_PATH=$RUNNER_TEMP/api_key.p8
          echo "$APPSTORE_API_KEY" | base64 --decode > $API_KEY_PATH
          # xcrun altool --upload-app --type ios --file build/ipa/Longeviclinics.ipa --apiKey "$APPSTORE_KEY_ID" --apiIssuer "$APPSTORE_ISSUER_ID" --apiPrivateKey "$API_KEY_PATH"

      - name: Notify Slack/Discord
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{"text":"iOS Build: ${{ job.status }}"}' "$SLACK_WEBHOOK"
          curl -X POST -H 'Content-type: application/json' --data '{"content":"iOS Build: ${{ job.status }}"}' "$DISCORD_WEBHOOK"
