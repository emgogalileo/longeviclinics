name: Build Android

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bump Version
        run: node scripts/bump-version.js
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE_BASE64 }}" | base64 --decode > android/app/longeviclinics-release.jks

      - name: Prebuild Android
        run: npx expo prebuild --platform android --no-install

      - name: Build Android App Bundle (AAB)
        env:
          MYAPP_RELEASE_STORE_FILE: longeviclinics-release.jks
          MYAPP_RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          MYAPP_RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          MYAPP_RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload to Firebase App Distribution
        if: github.ref == 'refs/heads/main'
        uses: w9jds/firebase-action@master
        with:
          args: appdistribution:distribute android/app/build/outputs/bundle/release/app-release.aab --app ${{ secrets.FIREBASE_ANDROID_APP_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Notify Slack/Discord
        if: always()
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{"text":"Android Build: ${{ job.status }}"}' ${{ secrets.SLACK_WEBHOOK }}
          curl -X POST -H 'Content-type: application/json' --data '{"content":"Android Build: ${{ job.status }}"}' ${{ secrets.DISCORD_WEBHOOK }}
